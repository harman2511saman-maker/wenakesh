<!DOCTYPE html>
<html lang="ku" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>وێنەکێش | وەرگێڕی وێنە بۆ تابلۆی قەڵەم خەڵووز</title>
    <meta name="description" content="وێنەکانت بگۆڕە بۆ تابلۆی ڕاستەقینەی قەڵەم خەڵووزی بە دەست کێشراو. پوخت، هونەری، و ئامادە بۆ چاپکردن." />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Outfit:wght@300;400;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Vazirmatn:wght@100..900&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    
    <!-- SVG Filter for Hand-drawn effect -->
    <svg style="position: absolute; width: 0; height: 0;">
      <filter id="pencil-filter">
        <feTurbulence type="fractalNoise" baseFrequency="0.05" numOctaves="3" result="noise" />
        <feDisplacementMap in="SourceGraphic" in2="noise" scale="2" />
      </filter>
    </svg>

    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
